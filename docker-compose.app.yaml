services:
  kong:
    image: kong:latest
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
    volumes:
      - ./kong.yaml:/etc/kong/kong.yml
    ports:
      - 10.10.7.9:8000
      - '8001:8001'
    networks:
      - template-network
  default-service:
    build: .
    environment:
      - PORT=5044
    networks:
      - template-network
    ports:
      - '5044:5044'
    volumes:
      - shared-data:/app/uploads
  asset-service:
    build: .
    environment:
      - PORT=5043
    networks:
      - template-network
    ports:
      - '5043:5043'
    volumes:
      - shared-data:/app/uploads

volumes:
  shared-data: null
networks:
  template-network:
    external: true
